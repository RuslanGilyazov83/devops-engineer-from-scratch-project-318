---
# Сначала чистим конфликтующие записи — иначе apt вообще не работает
- name: Удалить все конфликтующие файлы репозитория Docker
  ansible.builtin.shell: |
    rm -f /etc/apt/sources.list.d/docker.list
    rm -f /etc/apt/sources.list.d/docker.sources
    rm -f /etc/apt/sources.list.d/download_docker_com_linux_ubuntu.list
    rm -f /etc/apt/trusted.gpg.d/docker.gpg
    rm -f /etc/apt/keyrings/docker.gpg
    apt-get clean
  changed_when: true

- name: Установить системные зависимости для Docker
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

- name: Создать директорию для ключей apt
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Скачать GPG-ключ Docker в keyring
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
    force: true

- name: Определить архитектуру для Docker APT repo
  ansible.builtin.set_fact:
    docker_apt_arch: >-
      {{ 'amd64' if ansible_architecture in ['x86_64', 'amd64']
      else 'arm64' if ansible_architecture in ['aarch64', 'arm64']
      else 'armhf' if ansible_architecture in ['armv7l', 'armhf']
      else 'ppc64el' if ansible_architecture == 'ppc64le'
      else 's390x' if ansible_architecture == 's390x'
      else 'amd64' }}

- name: Подключить репозиторий Docker
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ docker_apt_arch }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
    state: present
    filename: docker

- name: Обновить кэш apt после добавления репозитория Docker
  ansible.builtin.apt:
    update_cache: true

- name: Установить Docker и плагины
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
  when: not ansible_check_mode

- name: Убедиться что Docker запущен и включён в автозапуск
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
  when: not ansible_check_mode

- name: Добавить пользователя в группу docker
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true
  when: not ansible_check_mode
