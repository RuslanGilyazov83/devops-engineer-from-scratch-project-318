---
# Сначала чистим конфликтующие записи — иначе apt вообще не работает
- name: Удалить все конфликтующие файлы репозитория Docker
  ansible.builtin.shell: |
    rm -f /etc/apt/sources.list.d/docker.list
    rm -f /etc/apt/sources.list.d/docker.sources
    rm -f /etc/apt/sources.list.d/download_docker_com_linux_ubuntu.list
    rm -f /etc/apt/trusted.gpg.d/docker.gpg
    rm -f /etc/apt/keyrings/docker.gpg
    apt-get clean
  changed_when: true

- name: Установить системные зависимости для Docker
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

- name: Создать директорию для ключей apt
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Скачать GPG-ключ Docker в keyring
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
    force: true

- name: Получить архитектуру системы
  ansible.builtin.command: dpkg --print-architecture
  register: dpkg_arch
  changed_when: false

- name: Подключить репозиторий Docker
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ dpkg_arch.stdout }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
    state: present
    filename: docker

- name: Установить Docker и плагины
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Убедиться что Docker запущен и включён в автозапуск
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Добавить пользователя в группу docker
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true
