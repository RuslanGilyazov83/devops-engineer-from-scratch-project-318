---
# Loki — хранение и запрос логов
# https://grafana.com/oss/loki/

- name: Создать директорию конфигов Loki
  ansible.builtin.file:
    path: /etc/loki
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Развернуть конфиг Loki
  ansible.builtin.template:
    src: loki-config.yml.j2
    dest: /etc/loki/loki-config.yml
    owner: root
    group: root
    mode: '0644'
  notify: Перезапустить Loki

- name: Открыть порт Loki в ufw только для app-сервера
  community.general.ufw:
    rule: allow
    port: "{{ loki_port | string }}"
    proto: tcp
    src: "{{ app_server_host }}"

- name: Запустить контейнер Loki
  community.docker.docker_container:
    name: loki
    image: "grafana/loki:{{ loki_version }}"
    restart_policy: unless-stopped
    state: started
    recreate: true
    published_ports:
      - "0.0.0.0:{{ loki_port }}:3100"
    volumes:
      - loki_data:/loki
      - /etc/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    networks:
      - name: monitoring
    command:
      - -config.file=/etc/loki/loki-config.yml
