---
- name: Создать директории для provisioning и дашбордов
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "472"
    group: "472"
    mode: '0755'
  loop:
    - /etc/grafana/provisioning/datasources
    - /etc/grafana/provisioning/dashboards
    - /etc/grafana/dashboards

- name: Развернуть конфиг datasource Prometheus
  ansible.builtin.template:
    src: datasources/prometheus.yml.j2
    dest: /etc/grafana/provisioning/datasources/prometheus.yml
    owner: "472"
    group: "472"
    mode: '0644'
  notify: Перезапустить Grafana

- name: Развернуть конфиг datasource Loki
  ansible.builtin.template:
    src: datasources/loki.yml.j2
    dest: /etc/grafana/provisioning/datasources/loki.yml
    owner: "472"
    group: "472"
    mode: '0644'
  notify: Перезапустить Grafana

- name: Развернуть провайдер дашбордов
  ansible.builtin.template:
    src: dashboards/provider.yml.j2
    dest: /etc/grafana/provisioning/dashboards/provider.yml
    owner: "472"
    group: "472"
    mode: '0644'
  notify: Перезапустить Grafana

- name: Скопировать JSON-файлы дашбордов
  ansible.builtin.copy:
    src: "dashboards/{{ item }}"
    dest: "/etc/grafana/dashboards/{{ item }}"
    owner: "472"
    group: "472"
    mode: '0644'
  loop:
    - system-resources.json
    - spring-app.json
  notify: Перезапустить Grafana

- name: Открыть порт Grafana в ufw
  community.general.ufw:
    rule: allow
    port: "{{ grafana_port | string }}"
    proto: tcp

- name: Запустить контейнер Grafana
  community.docker.docker_container:
    name: grafana
    image: "grafana/grafana:{{ grafana_version }}"
    restart_policy: unless-stopped
    state: started
    recreate: true
    published_ports:
      - "0.0.0.0:{{ grafana_port }}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - /etc/grafana/provisioning:/etc/grafana/provisioning:ro
      - /etc/grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - name: monitoring
    env:
      GF_SECURITY_ADMIN_USER: "{{ grafana_admin_user }}"
      GF_SECURITY_ADMIN_PASSWORD: "{{ grafana_admin_password }}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/etc/grafana/dashboards/system-resources.json"
