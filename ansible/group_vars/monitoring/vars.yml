# Версия образа Prometheus
prometheus_version: "v2.55.0"

# Порт, на котором Prometheus будет доступен снаружи
prometheus_port: 9090

# Интервалы опроса и оценки правил
prometheus_scrape_interval: "15s"
prometheus_evaluation_interval: "15s"

# Grafana
grafana_version: "latest"
grafana_port: 3000
grafana_admin_user: "admin"
# grafana_admin_password — из Vault (ansible/group_vars/all/vault.yml)

# Loki
loki_version: "3.6.7"
loki_port: 3100
