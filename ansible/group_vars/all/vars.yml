# Docker-образ приложения
app_image_name: ruslangilyazov/project-devops-deploy
app_image_tag: latest
app_container_name: bulletins-app

# Порты приложения
app_port: 8080
app_management_port: 9090

# Docker-сеть — общая для приложения и БД
docker_network: bulletins-net

# Node Exporter
node_exporter_version: "1.10.0"
node_exporter_port: 9100

# IP app-сервера — используется при шаблонизации конфига Prometheus
app_server_host: "158.160.223.121"

# IP сервера мониторинга — только с него разрешён доступ к Node Exporter
monitoring_server_ip: "93.77.187.78"

# Таргеты Prometheus — пополняются по мере добавления новых экспортеров
prometheus_scrape_configs:
  - job_name: "node_exporter"
    targets:
      - "{{ app_server_host }}:{{ node_exporter_port }}"
  - job_name: "spring_app"
    metrics_path: "/actuator/prometheus"
    targets:
      - "{{ app_server_host }}"

# Секреты задаются через ansible-vault (ansible/group_vars/vault.yml)
# postgres_db: appdb
# postgres_user: appuser
# postgres_password: secret
# s3_bucket: ""
# s3_region: ""
# s3_endpoint: ""
# s3_access_key: ""
# s3_secret_key: ""
